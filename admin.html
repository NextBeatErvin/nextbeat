<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NextBeat - Admin</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="subpage">
<nav class="navbar">
  <a href="index.html#home" class="logo-button" title="Főoldal">
    <img src="assets/nextbeat-logo-color.png" alt="NextBeat logó">
  </a>
  <div class="menu">
    <a href="index.html#home">Főoldal</a>
    <a href="scanner.html">QR beolvasó</a>
    <a href="index.html#regisztracio">Regisztráció</a>
  </div>
</nav>

<main class="admin-layout">
  <aside class="sidebar">
    <img src="assets/nextbeat-logo-white.png" alt="NextBeat">
    <a class="active" href="#">Vendégek</a>
    <a href="scanner.html">Beolvasó</a>
    <a href="#">Statisztikák</a>
    <a href="#">Export</a>
    <a href="#">Beállítások</a>
  </aside>

  <section class="admin-content">
    <p class="label">Admin</p>
    <h1>Vendéglista</h1>
    <div id="modeBox" class="notice"></div>

    <div class="summary-grid">
      <div><span id="totalCount">0</span><p>Összes regisztrált</p></div>
      <div><span id="usedCount">0</span><p>Beolvasott</p></div>
      <div><span id="todayCount">0</span><p>Mai regisztrált</p></div>
    </div>

    <div class="admin-actions">
      <button id="loadGuests" class="btn primary">Lista frissítése</button>
      <button id="exportCsv" class="btn ghost">Export CSV / Excel</button>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Név</th>
            <th>Telefonszám</th>
            <th>Város</th>
            <th>Email</th>
            <th>Állapot</th>
          </tr>
        </thead>
        <tbody id="guestRows"></tbody>
      </table>
    </div>
  </section>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script src="admin.js"></script>
</body>
</html>
<script>
const password = prompt("Admin jelszó:");

if (password !== "NextBeat") {
    alert("Hibás jelszó!");
    window.location.href = "index.html";
}
</script>
